
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Orçamento Fourtime</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#5C5C5C;}
  #barra{position:fixed;inset:0 0 auto 0;height:44px;display:flex;align-items:center;gap:12px;
    padding:0 14px;background:#1E2328;color:#fff;font:13px/1 Roboto,-apple-system,'Segoe UI',sans-serif;z-index:5;}
  #barra .tit{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
  #barra button{border:1px solid rgba(255,255,255,.25);background:transparent;color:#fff;border-radius:7px;
    padding:6px 11px;font:inherit;font-size:12px;cursor:pointer;}
  #barra button:hover{border-color:#C6161B;background:#C6161B;}
  #quadro{position:absolute;top:44px;left:0;right:0;bottom:0;
    width:100%;height:calc(100% - 44px);border:0;background:#5C5C5C;display:block;}
  #painel{position:absolute;inset:44px 0 0 0;display:flex;align-items:center;justify-content:center;padding:24px;}
  .caixa{max-width:440px;text-align:center;color:#E4E7EA;font:14px/1.6 Roboto,-apple-system,'Segoe UI',sans-serif;}
  .caixa h2{margin:0 0 10px;font-size:17px;color:#fff;}
  .caixa p{margin:0 0 18px;color:#C4C8CC;}
  .caixa button{border:0;background:#C6161B;color:#fff;border-radius:8px;padding:11px 22px;
    font:inherit;font-size:14px;font-weight:600;cursor:pointer;}
  .caixa button:hover{filter:brightness(1.1);}
  .caixa .erro{color:#FF9A9D;font-size:12.5px;margin-top:14px;word-break:break-word;}
  .caixa code{background:rgba(255,255,255,.12);padding:1px 5px;border-radius:4px;}
  /* ---- controles de zoom, canto inferior direito ---- */
  #zoomBar{position:fixed;right:18px;bottom:18px;z-index:6;display:none;
    align-items:center;gap:4px;padding:5px;border-radius:11px;
    background:rgba(30,35,40,.92);box-shadow:0 6px 22px rgba(0,0,0,.35);
    font:12px/1 Roboto,-apple-system,'Segoe UI',sans-serif;color:#fff;}
  #zoomBar.on{display:flex;}
  #zoomBar button{width:30px;height:30px;border:0;border-radius:8px;background:transparent;color:#fff;
    cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
  #zoomBar button:hover{background:#C6161B;}
  #zoomBar button svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;}
  #zoomBar .pct{min-width:48px;text-align:center;font-weight:600;font-variant-numeric:tabular-nums;cursor:pointer;
    padding:0 4px;border-radius:7px;}
  #zoomBar .pct:hover{background:rgba(255,255,255,.14);}
  #zoomBar .sep{width:1px;height:18px;background:rgba(255,255,255,.20);margin:0 2px;}
  .caixa a{color:#FF8F92;}
  .caixa .manual{margin-top:22px;padding-top:18px;border-top:1px solid rgba(255,255,255,.14);text-align:left;font-size:12.5px;}
  .caixa .manual b{color:#fff;}
  .caixa .manual ol{margin:8px 0 12px;padding-left:20px;color:#C4C8CC;}
  .caixa .manual li{margin-bottom:5px;}
  .caixa .linha{display:flex;gap:8px;}
  .caixa input{flex:1;min-width:0;border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.22);
    color:#fff;border-radius:7px;padding:9px 10px;font:inherit;font-size:12.5px;outline:none;}
  .caixa input:focus{border-color:#C6161B;}
  .caixa .linha button{padding:9px 16px;font-size:13px;}
  .caixa .sec{background:transparent;border:1px solid rgba(255,255,255,.25);}
  .caixa .sec:hover{border-color:#C6161B;background:#C6161B;}
</style>
</head>
<body>
<div id="barra">
  <span class="tit" id="tit">Orçamento</span>
  <button id="bImprimir" hidden>Imprimir / PDF</button>
  <button id="bBaixar" hidden>Baixar HTML</button>
  <button id="bFechar">Fechar</button>
</div>

<div id="painel"><div class="caixa" id="caixa">Carregando…</div></div>
<iframe id="quadro" hidden
  sandbox="allow-same-origin allow-scripts allow-modals allow-popups allow-downloads"></iframe>

<div id="zoomBar">
  <button id="zOut" title="Diminuir (roda do mouse)"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
  <span class="pct" id="zPct" title="Voltar ao tamanho da tela">100%</span>
  <button id="zIn" title="Aumentar (roda do mouse)"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
  <span class="sep"></span>
  <button id="zFit" title="Ajustar à tela"><svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4M15 3h4a2 2 0 0 1 2 2v4M9 21H5a2 2 0 0 1-2-2v-4M15 21h4a2 2 0 0 0 2-2v-4"/></svg></button>
</div>

<script>
/* ============================================================
   A MESMA API KEY que está em FT_TRELLO_KEY no Render.
   Sem ela o botão Autorizar não funciona.
   ============================================================ */
var CHAVE    = '5a21d827fc21ad2d68ec766dd4ba2011';   /* API key do Power-Up — pública por natureza */
var SERVIDOR = 'https://fourtime-etapa02.onrender.com';

var t = TrelloPowerUp.iframe({ appKey: CHAVE, appName: 'Fourtime Orçamentos' });
var args   = { q: t.arg('q'), titulo: t.arg('titulo') };
var quadro = document.getElementById('quadro');
var painel = document.getElementById('painel');
var caixa  = document.getElementById('caixa');
document.getElementById('tit').textContent = args.titulo || 'Orçamento';
document.getElementById('bFechar').onclick = function(){ t.closeModal(); };

function msg(html){ caixa.innerHTML = html; painel.style.display = 'flex'; quadro.hidden = true; }

function urlManual(){
  return 'https://trello.com/1/authorize?expiration=never&scope=read&response_type=token'
       + '&name=' + encodeURIComponent('Fourtime Orcamentos')
       + '&key='  + encodeURIComponent(CHAVE);
}

function guarda(token, origem){
  token = (token || '').trim();
  if(!token) return;
  t.set('member', 'private', 'token', token).then(abre).catch(function(e){
    pedeAutorizacao('Não consegui guardar o token: ' + (e && e.message || e));
  });
}

function pedeAutorizacao(erro){
  if(!CHAVE || CHAVE.length < 20){
    msg('<h2>Falta a API key</h2><p>A constante <code>CHAVE</code> em <code>powerup/visualizador.html</code> está vazia.</p>');
    return;
  }
  msg('<h2>Conectar ao Trello</h2>'
    + '<p>Para abrir o orçamento, o Power-Up precisa de permissão para ler os anexos deste cartão. '
    + 'É pedido uma única vez.</p>'
    + '<button id="bAut">Autorizar</button>'
    + (erro ? '<div class="erro">' + erro + '</div>' : '')
    + '<div class="manual">'
    +   '<b>Se o botão não funcionar</b> (bloqueador de anúncios costuma travar a janela):'
    +   '<ol>'
    +     '<li><a id="lnk" href="' + urlManual() + '" target="_blank" rel="noopener">Abrir a autorização do Trello</a> '
    +         'numa aba nova e clicar em <b>Allow</b>.</li>'
    +     '<li>O Trello mostra um <b>token</b> (texto longo). Copie e cole aqui:</li>'
    +   '</ol>'
    +   '<div class="linha">'
    +     '<input id="tkManual" type="text" placeholder="cole o token aqui" autocomplete="off" spellcheck="false">'
    +     '<button class="sec" id="bManual">Salvar</button>'
    +   '</div>'
    + '</div>');

  document.getElementById('bManual').onclick = function(){
    guarda(document.getElementById('tkManual').value, 'manual');
  };
  document.getElementById('tkManual').onkeydown = function(e){
    if(e.key === 'Enter') document.getElementById('bManual').click();
  };

  document.getElementById('bAut').onclick = function(){
    var b = document.getElementById('bAut');
    b.disabled = true;
    b.textContent = 'Abrindo a janela do Trello…';
    var respondeu = false;

    /* se o popup for bloqueado, o t.authorize fica pendurado para sempre:
       damos 25s e caímos no caminho manual, que sempre funciona */
    var relogio = setTimeout(function(){
      if(respondeu) return;
      respondeu = true;
      pedeAutorizacao('A janela do Trello não respondeu (provavelmente bloqueada). '
                    + 'Use o caminho manual abaixo — funciona igual.');
    }, 25000);

    t.authorize({
      type: 'popup',
      name: 'Fourtime Orçamentos',
      scope: { read: true },
      expiration: 'never'
    }).then(function(token){
      if(respondeu) return;
      respondeu = true; clearTimeout(relogio);
      if(!token) throw new Error('O Trello não devolveu o token.');
      guarda(token, 'popup');
    }).catch(function(e){
      if(respondeu) return;
      respondeu = true; clearTimeout(relogio);
      pedeAutorizacao('Não foi possível autorizar automaticamente: ' + (e && e.message || e)
                    + ' — use o caminho manual abaixo.');
    });
  };
}

/* ================================================================
   VISOR — zoom próprio
   O orçamento traz o auto-zoom do editor, feito para a tela do editor.
   Aqui ele é desligado e o zoom passa a ser nosso:
     · ajuste automático: a folha cresce até ENCOSTAR primeiro na largura
       OU na altura — o que acontecer antes
     · roda do mouse dá zoom, mantendo sob o cursor o ponto que estava lá
     · arrastar move o documento
     · botões + / − / ajustar no canto inferior direito
     · Esc fecha
   ================================================================ */
var Z = { z:1, fit:1, area:null, folha:null, jan:null, doc:null };
var zoomBar = document.getElementById('zoomBar');
var zPct = document.getElementById('zPct');
var MARGEM = 34;      /* respiro em volta da folha */

function zAplica(nz, foco){
  if(!Z.area) return;
  var novo = Math.min(5, Math.max(0.12, nz));
  var k = novo / Z.z;
  var sx = Z.area.scrollLeft, sy = Z.area.scrollTop;
  Z.z = novo;
  Z.area.style.setProperty('--zoom', String(novo));
  zPct.textContent = Math.round(novo * 100) + '%';
  /* mantém sob o cursor (ou no centro) o mesmo ponto do documento */
  var px = foco ? foco.x : Z.jan.innerWidth / 2;
  var py = foco ? foco.y : Z.jan.innerHeight / 2;
  Z.area.scrollLeft = (sx + px) * k - px;
  Z.area.scrollTop  = (sy + py) * k - py;
}

function zTamanhoFolha(){
  var antes = Z.area.style.getPropertyValue('--zoom');
  Z.area.style.setProperty('--zoom', '1');
  var t = { w: Z.folha.offsetWidth, h: Z.folha.offsetHeight };
  Z.area.style.setProperty('--zoom', antes || String(Z.z));
  return t;
}

function zAjusta(){
  if(!Z.area || !Z.folha) return;
  var f = zTamanhoFolha();
  if(!f.w || !f.h) return;
  var vw = Z.jan.innerWidth  - MARGEM * 2;
  var vh = Z.jan.innerHeight - MARGEM * 2;
  Z.fit = Math.min(vw / f.w, vh / f.h);     /* o que encostar primeiro manda */
  Z.z = 1;                                   /* zAplica calcula a partir daqui */
  Z.area.style.setProperty('--zoom', '1');
  zAplica(Z.fit);
  Z.area.scrollTop = 0;
  Z.area.scrollLeft = Math.max(0, (Z.area.scrollWidth - Z.area.clientWidth) / 2);
}

function montaVisor(){
  var w, d;
  try{ w = quadro.contentWindow; d = quadro.contentDocument; }catch(e){ return; }
  if(!w || !d) return;
  var area  = d.querySelector('.area-paginas');
  var folha = d.querySelector('.folha-a4');
  if(!area || !folha){ setTimeout(montaVisor, 200); return; }

  Z.jan = w; Z.doc = d; Z.area = area; Z.folha = folha;

  /* 1. desliga o auto-zoom do editor: quem manda agora é o visor */
  try{ w.aplicaZoom = function(){}; }catch(e){}

  /* 2. a área ocupa a janela inteira do iframe e rola sozinha */
  area.style.maxHeight = '100vh';
  area.style.height    = '100vh';
  area.style.overflow  = 'auto';
  d.documentElement.style.overflow = 'hidden';

  /* 3. roda do mouse = zoom (no ponto do cursor) */
  d.addEventListener('wheel', function(e){
    e.preventDefault();
    var fator = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    zAplica(Z.z * fator, { x: e.clientX, y: e.clientY });
  }, { passive: false });

  /* 4. arrastar move o documento (menos sobre a imagem, que tem o duplo clique) */
  var pegando = false, x0 = 0, y0 = 0, sx0 = 0, sy0 = 0;
  d.addEventListener('mousedown', function(e){
    if(e.button !== 0) return;
    pegando = true;
    x0 = e.clientX; y0 = e.clientY;
    sx0 = area.scrollLeft; sy0 = area.scrollTop;
    d.body.style.cursor = 'grabbing';
  });
  d.addEventListener('mousemove', function(e){
    if(!pegando) return;
    area.scrollLeft = sx0 - (e.clientX - x0);
    area.scrollTop  = sy0 - (e.clientY - y0);
  });
  ['mouseup','mouseleave'].forEach(function(ev){
    d.addEventListener(ev, function(){ pegando = false; d.body.style.cursor = ''; });
  });

  /* 5. Esc fecha o visualizador, mesmo com o foco dentro do orçamento */
  d.addEventListener('keydown', function(e){ if(e.key === 'Escape') t.closeModal(); });

  /* 6. a janela do iframe mudou de tamanho? refaz o ajuste se ainda estiver nele */
  w.addEventListener('resize', function(){
    if(Math.abs(Z.z - Z.fit) < 0.01) zAjusta();
  });

  zoomBar.classList.add('on');
  zAjusta();
  requestAnimationFrame(zAjusta);        /* 2º passe: imagens já medidas */
  setTimeout(zAjusta, 300);
}

/* botões e teclado do lado de fora */
document.getElementById('zIn').onclick  = function(){ zAplica(Z.z * 1.2); };
document.getElementById('zOut').onclick = function(){ zAplica(Z.z / 1.2); };
document.getElementById('zFit').onclick = zAjusta;
zPct.onclick = zAjusta;
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){ t.closeModal(); return; }
  if(e.key === '+' || e.key === '=') zAplica(Z.z * 1.2);
  if(e.key === '-' || e.key === '_') zAplica(Z.z / 1.2);
  if(e.key === '0') zAjusta();
});
window.addEventListener('resize', function(){
  if(Z.area && Math.abs(Z.z - Z.fit) < 0.01) zAjusta();
});

function abre(){
  caixa.textContent = 'Carregando o orçamento…';
  painel.style.display = 'flex';
  t.get('member', 'private', 'token').then(function(tk){
    if(!tk){ pedeAutorizacao(); return; }
    var url = SERVIDOR + '/api/trello/anexo?' + args.q + '&token=' + encodeURIComponent(tk);
    var bB = document.getElementById('bBaixar');
    bB.hidden = false;
    bB.onclick = function(){ window.open(url, '_blank'); };
    return fetch(url, { credentials: 'omit' }).then(function(r){
      if(r.status === 401){                     /* token revogado ou inválido: pede de novo */
        return t.remove('member', 'private', 'token').then(function(){
          pedeAutorizacao('A autorização anterior não vale mais.');
        });
      }
      if(!r.ok){
        return r.text().then(function(txt){ throw new Error('HTTP ' + r.status + ' — ' + txt.slice(0, 180)); });
      }
      return r.text().then(function(html){
        /* ORDEM IMPORTA: o iframe tem de estar VISÍVEL antes de receber o conteúdo.
           Escondido, ele tem altura zero — e a folha sai espremida.               */
        painel.style.display = 'none';
        quadro.hidden = false;
        quadro.onload = function(){ montaVisor(); };
        quadro.srcdoc = html;

        var bI = document.getElementById('bImprimir');
        bI.hidden = false;
        bI.onclick = function(){
          try{ quadro.contentWindow.focus(); quadro.contentWindow.print(); }catch(e){}
        };
      });
    });
  }).catch(function(e){
    msg('<h2>Não consegui abrir</h2><p>' + (e && e.message || e) + '</p>'
      + '<button id="bAut">Autorizar de novo</button>');
    var b = document.getElementById('bAut');
    if(b) b.onclick = function(){ pedeAutorizacao(); };
  });
}

abre();
</script>
</body>
</html>
